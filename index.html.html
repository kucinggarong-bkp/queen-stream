<!doctype html><html><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'>
<title>Queen Stream</title><style>
body{margin:0;background:#111;color:#fff;font-family:Arial}header{padding:20px;text-align:center;background:#1b1b1b;font-size:32px;font-weight:bold}
.hero{height:220px;background:#222;display:flex;align-items:center;justify-content:center;font-size:36px}
#s{display:block;width:90%;max-width:600px;margin:20px auto;padding:12px;border-radius:8px;border:none}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;padding:20px}
.card{position:relative;cursor:pointer;background:#222;border-radius:12px;overflow:hidden;transition:.3s}
.card:hover{transform:scale(1.04)}img{width:100%;height:150px;object-fit:cover}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:60px;background:rgba(0,0,0,.35);opacity:0;transition:.3s}
.card:hover .overlay{opacity:1}.title{padding:10px}
#ad{margin:20px;padding:18px;background:#333;text-align:center;border-radius:8px}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);align-items:center;justify-content:center}
.box{width:92%;max-width:900px}iframe{width:100%;aspect-ratio:16/9;border:0}button{float:right;padding:8px 12px}
</style></head><body>
